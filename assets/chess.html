<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Chess — I-Games</title>
    <link rel="icon" href="../img/favicon.png" />

    <link rel="stylesheet" href="../js/lib/bootstrap.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/games.css" />
    <link rel="stylesheet" href="../css/chess.css" />
  </head>
  <body class="main-layout game-page">
    <div class="main-screen full" onclick="toggleMenu()"></div>

    <header class="header-container flex space-between">
      <h1 class="text-logo flex center">I-Games</h1>
      <div class="flex center">
        <nav class="header-nav">
          <ul class="main-nav-list flex">
            <li><a href="./about.html"> About</a></li>
            <li><a href="./more.html"> More Games</a></li>
            <li><a href="./contact.html"> Contact Us</a></li>
          </ul>
        </nav>
        <button class="toggle-menu" onclick="toggleMenu()">☰</button>
      </div>
    </header>

    <main class="game-shell">
      <section class="board-stage">
        <div class="board-frame">
          <div class="board chess-board" id="board"></div>
        </div>
      </section>
      <aside class="game-panel glass">
        <h1 class="game-title">♟ Chess</h1>
        <p class="game-subtitle">Outsmart the engine.</p>
        <div class="status-banner" id="status">White to move</div>
        <div class="control-group">
          <span class="control-label">Mode</span>
          <div class="seg" id="modeSeg">
            <button class="seg-btn active" data-mode="ai">Vs Computer</button>
            <button class="seg-btn" data-mode="pvp">Vs Friend</button>
          </div>
        </div>
        <div class="control-group">
          <span class="control-label">Difficulty</span>
          <div class="seg" id="diffSeg">
            <button class="seg-btn" data-depth="2">Easy</button>
            <button class="seg-btn active" data-depth="3">Medium</button>
            <button class="seg-btn" data-depth="4">Hard</button>
          </div>
        </div>
        <div class="panel-actions">
          <button class="game-btn game-btn--primary" id="newGameBtn">New Game</button>
          <button class="game-btn" id="undoBtn">Undo</button>
        </div>
        <div class="panel-section">
          <h3>Captured</h3>
          <div class="chips" id="captured"></div>
        </div>
        <div class="panel-section">
          <h3>Moves</h3>
          <div id="moveList" style="max-height:160px;overflow:auto;font-family:monospace;font-size:0.85rem;line-height:1.6;color:var(--ink-soft)"></div>
        </div>
      </aside>
    </main>

    <div class="win-overlay hidden" id="winOverlay">
      <div class="win-card glass">
        <div class="win-emoji" id="winEmoji">🏆</div>
        <h2 class="win-title" id="winTitle"></h2>
        <p class="win-subtitle" id="winSubtitle"></p>
        <button class="game-btn game-btn--primary" id="winBtn">Play Again</button>
      </div>
    </div>

    <script src="../js/utils/game-ui.js"></script>
    <script src="../js/chess.js"></script>
  </body>
</html>
