<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="../js/lib/bootstrap.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/games.css" />
    <link rel="stylesheet" href="../css/checkers.css" />
    <link rel="icon" href="../img/favicon.png" />

    <title>Checkers — I-Games</title>
  </head>
  <body class="main-layout game-page">
    <div class="main-screen full" onclick="toggleMenu()"></div>

        <header class="header-container flex">
      <a class="text-logo flex center" href="../index.html">I-Games</a>
    </header>

    <main class="game-shell">
      <section class="board-stage">
        <div class="board-frame">
          <div class="board checkers-board" id="board"></div>
        </div>
      </section>
      <aside class="game-panel glass">
        <h1 class="game-title">⛀ Checkers</h1>
        <p class="game-subtitle">Forced captures. Crown your kings.</p>
        <div class="status-banner" id="status">Your move</div>
        <div class="control-group">
          <span class="control-label">Mode</span>
          <div class="seg" id="modeSeg">
            <button class="seg-btn active" data-mode="ai">Vs Computer</button>
            <button class="seg-btn" data-mode="pvp">Vs Friend</button>
          </div>
        </div>
        <div class="control-group">
          <span class="control-label">Difficulty</span>
          <div class="seg" id="diffSeg">
            <button class="seg-btn" data-depth="3">Easy</button>
            <button class="seg-btn active" data-depth="5">Medium</button>
            <button class="seg-btn" data-depth="7">Hard</button>
          </div>
        </div>
        <div class="control-group">
          <span class="control-label">Backward capture (in multi-jump)</span>
          <div class="seg" id="backSeg">
            <button class="seg-btn active" data-back="on">On</button>
            <button class="seg-btn" data-back="off">Off</button>
          </div>
        </div>
        <div class="panel-actions">
          <button class="game-btn game-btn--primary" id="newGameBtn">New Game</button>
          <button class="game-btn" id="undoBtn">Undo</button>
        </div>
        <div class="panel-section">
          <h3>Captured</h3>
          <div class="chips" id="captured"></div>
        </div>
      </aside>
    </main>

    <div class="win-overlay hidden" id="winOverlay">
      <div class="win-card glass">
        <div class="win-emoji" id="winEmoji">🏆</div>
        <h2 class="win-title" id="winTitle"></h2>
        <p class="win-subtitle" id="winSubtitle"></p>
        <button class="game-btn game-btn--primary" id="winBtn">Play Again</button>
      </div>
    </div>

    <script src="../js/utils/game-ui.js"></script>
    <script src="../js/checkers.js"></script>
  </body>
</html>
