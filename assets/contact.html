<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="../js/lib/bootstrap.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/games.css" />
    <link rel="stylesheet" href="../css/site.css" />
    <link rel="icon" href="../img/favicon.png" />

    <title>Contact Us — I-Games</title>
  </head>
  <body class="main-layout game-page">
    <div class="main-screen full" onclick="toggleMenu()"></div>

        <header class="header-container flex">
      <a class="text-logo flex center" href="../index.html">I-Games</a>
    </header>

    <section class="home-hero">
      <span class="kicker">★ Get in touch ★</span>
      <h1 style="font-size: clamp(2.6rem, 8vw, 4.5rem)">Contact Us</h1>
      <p class="tagline">
        We value your feedback — questions, ideas or just to say hi.
      </p>
    </section>

    <div class="contact-card glass">
      <form id="contactForm">
        <div class="mb-3">
          <label class="form-label" for="name">Name</label>
          <input
            class="form-control"
            id="name"
            type="text"
            placeholder="Your name"
            data-sb-validations="required"
          />
          <div class="invalid-feedback" data-sb-feedback="name:required">
            Name is required.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="emailAddress">Email Address</label>
          <input
            class="form-control"
            id="emailAddress"
            type="email"
            placeholder="you@example.com"
            data-sb-validations="required, email"
          />
          <div class="invalid-feedback" data-sb-feedback="emailAddress:required">
            Email Address is required.
          </div>
          <div class="invalid-feedback" data-sb-feedback="emailAddress:email">
            Email Address Email is not valid.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="message">Message</label>
          <textarea
            class="form-control"
            id="message"
            type="text"
            placeholder="Your message"
            style="height: 10rem"
            data-sb-validations="required"
          ></textarea>
          <div class="invalid-feedback" data-sb-feedback="message:required">
            Message is required.
          </div>
        </div>

        <div class="d-none" id="submitSuccessMessage">
          <div class="text-center mb-3">Form submission successful!</div>
        </div>

        <div class="d-none" id="submitErrorMessage">
          <div class="text-center text-danger mb-3">Error sending message!</div>
        </div>

        <div class="d-grid">
          <button class="btn btn-primary btn-lg" type="submit">Send Message</button>
        </div>
      </form>
    </div>

    <script>
      function toggleMenu() {
        document.body.classList.toggle('menu-opened')
      }
    </script>
    <script src="../js/lib/bootstrap.bundel.js"></script>
  </body>
</html>
